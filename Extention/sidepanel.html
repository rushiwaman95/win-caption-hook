<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #qwen-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Optional: Loading indicator */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none; /* Hidden by default */
            color: #333;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="loading">Loading Qwen...</div>
    <iframe id="qwen-frame" src="https://chat.qwen.ai/"></iframe>
    <script src="sidepanel.js"></script>
</body>
</html>
