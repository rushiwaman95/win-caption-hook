<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Live Captions</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#0a0a0a;
            color:#e0e0e0;
            font-family:-apple-system,system-ui,sans-serif;
        }
        .cards{
            padding:16px 16px 80px;
            display:flex;
            flex-direction:column;
            gap:2px;
        }
        .card{
            background:#111;
            padding:14px 16px;
            font-size:14px;
            line-height:1.6;
            border-bottom:1px solid #1a1a1a;
            border-radius:8px;
            position:relative;
            animation:fadeIn .3s;
            word-break:break-word;
            -webkit-user-select:text;
            user-select:text;
            cursor:pointer;
            transition:all .1s;
        }
        .card:active{
            background:#1a1a1a;
            transform:scale(0.98);
        }
        .card .cp{
            position:absolute;
            top:10px;right:12px;
            background:none;
            border:1px solid #333;
            color:#666;
            font-size:11px;
            padding:4px 10px;
            border-radius:4px;
            cursor:pointer;
            opacity:0;
            transition:opacity .2s;
            font-family:inherit;
        }
        .card:hover .cp{opacity:1}
        @media(max-width:600px){.card .cp{opacity:1}}
        .card .cp.done{color:#4CAF50;border-color:#4CAF50}
        @keyframes fadeIn{
            from{opacity:0;transform:translateY(6px)}
            to{opacity:1;transform:translateY(0)}
        }
        .card.active{
            border-left:3px solid #4CAF50;
            background:#161616;
        }
        .empty{
            text-align:center;
            color:#222;
            padding:80px 20px;
            font-size:13px;
        }
        .bar{
            position:fixed;
            bottom:0;left:0;right:0;
            background:#0a0a0a;
            border-top:1px solid #1a1a1a;
            padding:12px 16px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            font-size:12px;
            color:#333;
        }
        .bar button{
            background:#161616;
            color:#888;
            border:1px solid #222;
            padding:8px 16px;
            border-radius:6px;
            cursor:pointer;
            font-size:12px;
            font-family:inherit;
        }
        .bar button:active{background:#222}
        .bar button.done{color:#4CAF50;border-color:#4CAF50}
    </style>
</head>
<body>
<div class="cards" id="cards">
    <div class="empty" id="empty">waiting for captions</div>
</div>
<div class="bar">
    <span id="count">0 cards</span>
    <button onclick="copyAll(this)">copy all</button>
</div>
<script>
let rendered = 0;
let allTexts = [];
let wasAtBottom = true;

function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function isNearBottom() {
    return (window.innerHeight + window.scrollY) >= (document.body.scrollHeight - 100);
}

setInterval(() => {
    wasAtBottom = isNearBottom();
    fetch('/stream').then(r => r.json()).then(d => {
        updateCards(d.cards || []);
        updateCurrent(d.current || '');
    }).catch(() => {});
}, 100);

function updateCards(cards) {
    if (cards.length <= rendered) return;
    const e = document.getElementById('empty');
    if (e) e.remove();
    const container = document.getElementById('cards');

    for (let i = rendered; i < cards.length; i++) {
        const div = document.createElement('div');
        div.className = 'card';
        div.id = 'c' + i;
        div.innerHTML =
            '<button class="cp" onclick="cpCard(event,' + i + ')">copy</button>' +
            '<span class="t">' + esc(cards[i]) + '</span>';
        div.onclick = (e) => {
            if (e.target.className !== 'cp') {
                injectToGPT(cards[i]);
            }
        };

        const cur = document.getElementById('current');
        if (cur) {
            container.insertBefore(div, cur);
        } else {
            container.appendChild(div);
        }
    }

    allTexts = cards;
    rendered = cards.length;
    document.getElementById('count').textContent =
        rendered + ' card' + (rendered !== 1 ? 's' : '');

    if (wasAtBottom) {
        window.scrollTo(0, document.body.scrollHeight);
    }
}

function updateCurrent(text) {
    let el = document.getElementById('current');
    if (text) {
        const e = document.getElementById('empty');
        if (e) e.remove();
        if (el) {
            el.textContent = text;
        } else {
            const div = document.createElement('div');
            div.className = 'card active';
            div.id = 'current';
            div.textContent = text;
            document.getElementById('cards').appendChild(div);
        }
        if (wasAtBottom) {
            window.scrollTo(0, document.body.scrollHeight);
        }
    } else {
        if (el) el.remove();
    }
}

function cpCard(e, i) {
    e.stopPropagation();
    const c = document.getElementById('c' + i);
    const b = c.querySelector('.cp');
    navigator.clipboard.writeText(c.querySelector('.t').textContent);
    b.textContent = 'copied';
    b.classList.add('done');
    setTimeout(() => { b.textContent = 'copy'; b.classList.remove('done'); }, 1000);
}

function copyAll(btn) {
    if (!allTexts.length) return;
    navigator.clipboard.writeText(allTexts.join('\n\n'));
    btn.textContent = 'copied!';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'copy all'; btn.classList.remove('done'); }, 1500);
}

function injectToGPT(text) {
    if (window.chrome && chrome.runtime) {
        chrome.runtime.sendMessage({ action: 'askChatGPT', prompt: text }, () => {});
    }
}
</script>
</body>
</html>
